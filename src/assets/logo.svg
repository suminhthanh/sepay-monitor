<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Circle background -->
  <circle cx="256" cy="256" r="256" fill="#0050C8"/>

  <!-- ₫ symbol centered -->
  <text
    x="256"
    y="300"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="220"
    font-weight="bold"
    fill="white"
  >₫</text>

  <!-- Signal arcs radiating top-right, centered around 315deg (top-right diagonal) -->
  <!-- Arc 1: innermost, full opacity -->
  <path
    d="M 310 180 A 60 60 0 0 1 370 240"
    fill="none"
    stroke="white"
    stroke-width="20"
    stroke-linecap="round"
    opacity="1.0"
  />
  <!-- Arc 2: middle, 0.6 opacity -->
  <path
    d="M 320 148 A 100 100 0 0 1 420 248"
    fill="none"
    stroke="white"
    stroke-width="20"
    stroke-linecap="round"
    opacity="0.6"
  />
  <!-- Arc 3: outermost, 0.3 opacity -->
  <path
    d="M 330 112 A 145 145 0 0 1 474 256"
    fill="none"
    stroke="white"
    stroke-width="20"
    stroke-linecap="round"
    opacity="0.3"
  />
</svg>
